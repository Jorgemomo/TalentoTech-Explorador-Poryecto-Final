<!doctype html>

<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SEMED - Iniciar sesión</title>

    <link rel="stylesheet" href="../static/estilo.css" />
  </head>

  <body>
    <!-- Barra de navegación -->

    <header>
      <div class="logo">SEMED</div>

      <nav>
        <ul>
          <li><a href="#">Manual de usuario</a></li>

          <li><a href="#">Contacto</a></li>

          <li>
            <a href="./registro.html" class="btn-register">Registrarse</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Contenedor principal -->

    <main>
      <div class="login-box">
        <h1>SEMED</h1>

        <p class="subtitle">Sistema de Gestión de Calidad del Método Semed</p>

        <form>
          <label for="email">Correo electrónico</label>

          <input
            type="email"
            id="email"
            placeholder="ejemplo@clinica.com"
            required
          />

          <label for="password">Contraseña</label>

          <input
            type="password"
            id="password"
            placeholder="********"
            required
          />

          <div class="options">
            <a href="#">¿Olvidaste tu contraseña?</a>

            <label> <input type="checkbox" /> Mantener sesión iniciada </label>
          </div>

          <button type="submit" class="btn-login">Iniciar sesión</button>

          <p class="register-link">
            ¿No tienes una cuenta? <a href="#">Regístrate</a>
          </p>
        </form>
      </div>
    </main>

    <!-- Pie de página -->

    <footer>
      <p>
        © 2023 SEMED - Sistema de gestión semed. Todos los derechos reservados.
      </p>
    </footer>
  </body>
</html>
